<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Questrial', sans-serif;
            overflow: hidden;
        }
        #btn-paste {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 38px;
            background-color: #EC2024;
            color: #FFFFFF;
            border: 1px solid #EC2024;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            outline: none;
            user-select: none;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        #btn-paste:hover {
            background-color: #C01A1E;
            border-color: #C01A1E;
        }
        #btn-paste:focus {
            box-shadow: 0 0 0 2px rgba(236, 32, 36, 0.4);
        }
        #preview-container {
            display: none;
            text-align: center;
            margin-top: 6px;
        }
        #preview {
            max-width: 100%;
            max-height: 80px;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
        }
        #status {
            font-size: 11px;
            color: #2ECC71;
            margin-top: 3px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <button id="btn-paste" tabindex="0">
        📋 Pegar Portapapeles
    </button>
    <div id="preview-container">
        <div id="status">✅ ¡Imagen cargada!</div>
        <img id="preview" />
    </div>

    <script>
        // Funciones auxiliares para comunicarse con Streamlit
        function sendToStreamlit(type, data) {
            const msg = Object.assign({
                isStreamlitMessage: true,
                type: type,
            }, data);
            window.parent.postMessage(msg, "*");
        }

        function setFrameHeight(height) {
            sendToStreamlit("streamlit:setFrameHeight", { height: height });
        }

        function returnDataToPython(value) {
            sendToStreamlit("streamlit:setComponentValue", { value: value });
        }

        // Elementos del DOM
        const btn = document.getElementById('btn-paste');
        const previewContainer = document.getElementById('preview-container');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const base64Data = e.target.result;
                preview.src = base64Data;
                previewContainer.style.display = 'block';
                status.style.display = 'block';
                status.innerText = "✅ Imagen cargada";
                status.style.color = "#2ECC71";
                btn.innerText = "📋 Cambiar";
                btn.style.backgroundColor = "#2ECC71";
                btn.style.borderColor = "#2ECC71";
                
                setFrameHeight(135);
                returnDataToPython(base64Data);
            };
            reader.readAsDataURL(file);
        }

        // Eventos de pegado
        btn.addEventListener('click', async function() {
            try {
                const clipboardItems = await navigator.clipboard.read();
                let found = false;
                for (const item of clipboardItems) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            const blob = await item.getType(type);
                            processImage(blob);
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                }
                if (!found) {
                    btn.innerText = "👉 Presiona Ctrl+V";
                    btn.style.backgroundColor = "#E67E22";
                    btn.style.borderColor = "#E67E22";
                    btn.focus();
                }
            } catch (err) {
                btn.innerText = "👉 Presiona Ctrl+V";
                btn.style.backgroundColor = "#E67E22";
                btn.style.borderColor = "#E67E22";
                btn.focus();
            }
        });

        document.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let found = false;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    processImage(blob);
                    found = true;
                    break;
                }
            }
            if (!found) {
                btn.innerText = "⚠️ No hay imagen";
                btn.style.backgroundColor = "#E67E22";
                btn.style.borderColor = "#E67E22";
            }
        });

        // 1. Inicialización: Le decimos a Streamlit que estamos listos INMEDIATAMENTE
        sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
        
        // 2. Establecemos la altura inicial
        setFrameHeight(40);

        // 3. Escuchamos los eventos de renderizado (Streamlit Cloud los envía periódicamente)
        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === "streamlit:render") {
                // Mantenemos la altura si no hay imagen
                if (previewContainer.style.display !== 'block') {
                    setFrameHeight(40);
                } else {
                    setFrameHeight(135);
                }
            }
        });
    </script>
</body>
</html>
