<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Questrial', sans-serif;
            overflow: hidden;
        }
        #btn-paste {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 38px;
            background-color: #EC2024;
            color: #FFFFFF;
            border: 1px solid #EC2024;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            outline: none;
            user-select: none;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        #btn-paste:hover {
            background-color: #C01A1E;
            border-color: #C01A1E;
        }
        #btn-paste:focus {
            box-shadow: 0 0 0 2px rgba(236, 32, 36, 0.4);
        }
        #preview-container {
            display: none;
            text-align: center;
            margin-top: 6px;
        }
        #preview {
            max-width: 100%;
            max-height: 80px;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
        }
        #status {
            font-size: 11px;
            color: #2ECC71;
            margin-top: 3px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <button id="btn-paste" tabindex="0">
        📋 Pegar Portapapeles
    </button>
    <div id="preview-container">
        <div id="status">✅ ¡Imagen cargada!</div>
        <img id="preview" />
    </div>

    <script>
        const Streamlit = {
            setComponentValue: function(value) {
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setComponentValue",
                    value: value
                }, "*");
            },
            setFrameHeight: function(height) {
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setFrameHeight",
                    value: height
                }, "*");
            }
        };

        // Escuchar eventos de Streamlit para saber cuándo está listo
        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === "streamlit:render") {
                // Establecer la altura del frame una vez que Streamlit está listo
                Streamlit.setFrameHeight(40);
            }
        });

        // Enviar señal de que el componente está listo (Requerido por Streamlit)
        // Lo envolvemos en DOMContentLoaded para asegurar que el navegador ya cargó el iframe
        document.addEventListener("DOMContentLoaded", function() {
            window.parent.postMessage({
                isStreamlitMessage: true,
                type: "streamlit:componentReady",
                apiVersion: 1
            }, "*");
        });

        const btn = document.getElementById('btn-paste');
        const previewContainer = document.getElementById('preview-container');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');

        // Function to process image file
        function processImage(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const base64Data = e.target.result;
                preview.src = base64Data;
                previewContainer.style.display = 'block';
                status.style.display = 'block';
                status.innerText = "✅ Imagen cargada del portapapeles";
                status.style.color = "#2ECC71";
                btn.innerText = "📋 Cambiar Imagen";
                btn.style.backgroundColor = "#2ECC71";
                btn.style.borderColor = "#2ECC71";
                Streamlit.setFrameHeight(135);
                Streamlit.setComponentValue(base64Data);
            };
            reader.readAsDataURL(file);
        }

        // Direct Clipboard API Click Handler
        btn.addEventListener('click', async function() {
            try {
                // Try reading clipboard items directly
                const clipboardItems = await navigator.clipboard.read();
                let found = false;
                for (const item of clipboardItems) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            const blob = await item.getType(type);
                            processImage(blob);
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                }
                if (!found) {
                    btn.innerText = "👉 Presiona Ctrl+V";
                    btn.style.backgroundColor = "#E67E22";
                    btn.style.borderColor = "#E67E22";
                    btn.focus();
                }
            } catch (err) {
                // Fallback to manual paste instructions
                btn.innerText = "👉 Presiona Ctrl+V";
                btn.style.backgroundColor = "#E67E22";
                btn.style.borderColor = "#E67E22";
                btn.focus();
            }
        });

        // Event listener for manual Ctrl+V paste
        document.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let found = false;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    processImage(blob);
                    found = true;
                    break;
                }
            }
            if (!found) {
                btn.innerText = "⚠️ No hay imagen en portapapeles";
                btn.style.backgroundColor = "#E67E22";
                btn.style.borderColor = "#E67E22";
            }
        });
    </script>
</body>
</html>
